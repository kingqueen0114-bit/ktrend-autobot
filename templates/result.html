<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - K-Trend</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: {{ bg_color }}; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .result-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; max-width: 500px; }
        .result-icon { font-size: 64px; margin-bottom: 20px; }
        h1 { color: {{ heading_color }}; margin: 0 0 15px; }
        p { color: #666; margin: 10px 0; }
        .btn { display: inline-block; padding: 15px 30px; background: #1DB446; color: white; text-decoration: none; border-radius: 30px; font-weight: bold; margin: 10px 5px; }
        .btn-secondary { background: #0277bd; }
        .btn-outline { background: transparent; color: #0277bd; border: 1px solid #0277bd; }
        .url-text { word-break: break-all; font-size: 14px; color: #888; }
    </style>
</head>
<body>
    <div class="result-card">
        <div class="result-icon">{{ icon }}</div>
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
        {% if sub_message %}
        <p style="color: #888;">{{ sub_message }}</p>
        {% endif %}
        {% if url %}
        <p class="url-text">{{ url }}</p>
        {% endif %}
        {% for link in links %}
        <a href="{{ link.href }}" {% if link.target %}target="{{ link.target }}"{% endif %} class="btn {% if link.style %}btn-{{ link.style }}{% endif %}">{{ link.label }}</a>
        {% endfor %}
    </div>
</body>
</html>
