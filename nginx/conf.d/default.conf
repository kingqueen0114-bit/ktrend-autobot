# K-TREND TIMES Nginx設定
# WordPress + SSL (Let's Encrypt)

# HTTPをHTTPSにリダイレクト
server {
    listen 80;
    listen [::]:80;
    server_name k-trendtimes.com www.k-trendtimes.com;

    # Let's Encrypt 認証用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # その他はHTTPSにリダイレクト
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS サーバー
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name k-trendtimes.com www.k-trendtimes.com;

    # SSL証明書 (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/k-trendtimes.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/k-trendtimes.com/privkey.pem;

    # SSL設定 (セキュリティ強化)
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (HTTPSを強制)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ドキュメントルート
    root /var/www/html;
    index index.php index.html;

    # アップロードサイズ上限
    client_max_body_size 100M;

    # Gzip圧縮
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    # 静的ファイルのキャッシュ
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # WordPress用リライトルール
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP-FPM への転送
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    # セキュリティ: 隠しファイルへのアクセス禁止
    location ~ /\. {
        deny all;
    }

    # セキュリティ: wp-config.php へのアクセス禁止
    location ~* wp-config\.php {
        deny all;
    }

    # XML-RPC を無効化 (セキュリティ対策)
    location = /xmlrpc.php {
        deny all;
    }
}
